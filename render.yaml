# SightWhale — unified single-service deployment on Render
# Cost: $7 (web service) + $10.50 (postgres starter) = $17.50/month
# Down from: $127.37/month (8 services + Redis + Pro plan)

databases:
  - name: whale-postgres
    plan: starter          # Downgraded from basic-1gb — saves $13/month
    databaseName: whale
    user: whale
    ipAllowList: []

services:
  - type: web
    name: sightwhale
    runtime: docker
    rootDir: whale-monorepo
    dockerfilePath: docker/Dockerfile
    healthCheckPath: /health
    plan: starter
    dockerCommand: bash /app/docker/entrypoint-unified.sh
    envVars:
      # ── Database ──────────────────────────────────────────
      - key: DATABASE_URL
        fromDatabase:
          name: whale-postgres
          property: connectionString

      # ── Queue names (used internally by InMemoryRedis) ────
      - key: TRADE_CREATED_QUEUE
        value: trade_created
      - key: WHALE_TRADE_CREATED_QUEUE
        value: whale_trade_created
      - key: ALERT_CREATED_QUEUE
        value: alert_created
      - key: TRADE_INGEST_INCOMING_QUEUE
        value: trade_ingest_incoming

      # ── Polymarket APIs ───────────────────────────────────
      - key: POLYMARKET_DATA_API_TRADES_URL
        value: https://data-api.polymarket.com/trades
      - key: POLYMARKET_DATA_API_TRADES_URL_FALLBACK
        value: https://backup-api.polymarket.com/trades
      - key: POLYMARKET_DATA_API_MARKETS_URL
        value: https://gamma-api.polymarket.com/markets

      # ── Trade Ingest ──────────────────────────────────────
      - key: MARKET_INGEST_SECONDS
        value: "600"
      - key: TRADE_INGEST_SECONDS
        value: "30"
      - key: MARKET_INGEST_MAX
        value: "300"
      - key: MARKET_INGEST_BATCH
        value: "25"
      - key: TRADE_INGEST_BATCH_SIZE
        value: "200"
      - key: TRADE_INGEST_BATCH_SECONDS
        value: "3"

      # ── Whale Engine ──────────────────────────────────────
      - key: WHALE_SINGLE_TRADE_USD_THRESHOLD
        value: "5000"
      - key: WHALE_BUILD_USD_THRESHOLD
        value: "5000"
      - key: WHALE_STATS_TRADE_CAP
        value: "15"
      - key: WHALE_STATS_DAYS_7
        value: "3"
      - key: WHALE_STATS_DAYS_30
        value: "10"
      - key: WHALE_STATS_DAYS_90
        value: "30"
      - key: WHALE_RECOMPUTE_SECONDS
        value: "1800"
      - key: WHALE_CONSUME_SECONDS
        value: "1"
      - key: TRADE_CONSUME_BATCH
        value: "10"
      - key: WHALE_STATS_RAW_TRADE_CAP
        value: "5000"
      - key: WHALE_STATS_HISTORY_CAP
        value: "10000"

      # ── Alert Engine ──────────────────────────────────────
      - key: ALERT_MIN_TRADE_USD
        value: "5000"
      - key: ALERT_CONSUME_BATCH_SIZE
        value: "10"

      # ── Telegram ──────────────────────────────────────────
      - key: ALERT_FANOUT_RATE_LIMIT_PER_MINUTE
        value: "50"
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: BOT_USER_HASH_SECRET
        sync: false
      - key: TELEGRAM_ALERT_CHAT_ID
        sync: false

      # ── Health Check ──────────────────────────────────────
      - key: TELEGRAM_HEALTH_BOT_TOKEN
        sync: false
      - key: TELEGRAM_HEALTH_CHAT_ID
        sync: false
      - key: TELEGRAM_HEALTH_USERNAME
        sync: false

      # ── Payment / Stripe ──────────────────────────────────
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: LANDING_SUCCESS_URL
        sync: false
      - key: LANDING_CANCEL_URL
        sync: false
      - key: PAYMENT_MODE
        value: stripe
      - key: DEFAULT_CURRENCY
        value: usd

      # ── Blog / LLM ────────────────────────────────────────
      - key: BLOG_LLM_API_KEY
        sync: false

      # ── Proxy ─────────────────────────────────────────────
      - key: HTTPS_PROXY
        sync: false
