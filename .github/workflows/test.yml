name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Python backend tests (pytest) ─────────────────────
  python:
    name: Python Tests
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://user:pass@localhost:5432/db
      REDIS_URL: redis://localhost:6379/0
      LANDING_SUCCESS_URL: http://localhost:3000/success
      LANDING_CANCEL_URL: http://localhost:3000/cancel
    defaults:
      run:
        working-directory: whale-monorepo

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run pytest
        run: python -m pytest tests/ -v --tb=short

  # ── Landing frontend tests (vitest) ────────────────────
  landing:
    name: Landing Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: whale-monorepo/services/landing

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Run vitest
        run: npm test
