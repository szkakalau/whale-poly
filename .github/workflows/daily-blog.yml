name: Daily Blog Automation

on:
  schedule:
    # Run every day at 9:00 AM UTC (5:00 PM Beijing Time)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual triggering

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
    - name: Trigger blog generation via Render API
      run: |
        RESPONSE=$(curl -s -w "\n%{http_code}" -X POST \
          "https://sightwhale.onrender.com/blog/generate" \
          -H "x-admin-key: ${{ secrets.BLOG_LLM_API_KEY }}")
        HTTP_CODE=$(echo "$RESPONSE" | tail -1)
        BODY=$(echo "$RESPONSE" | sed '$d')
        echo "HTTP $HTTP_CODE: $BODY"
        if [ "$HTTP_CODE" != "200" ]; then
          echo "❌ Blog generation failed (HTTP $HTTP_CODE)"
          exit 1
        fi
        echo "✅ Blog generation triggered: $BODY"
