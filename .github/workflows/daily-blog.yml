name: Daily Blog Automation

on:
  schedule:
    # Run every day at 9:00 AM UTC (5:00 PM Beijing Time)
    - cron: '0 9 * * *'
  workflow_dispatch:  # Allow manual triggering
    inputs:
      force:
        description: 'Force generate (bypass time check)'
        type: boolean
        default: true

jobs:
  generate-blog:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        cd whale-monorepo
        pip install -r requirements.txt

    - name: Generate daily blog post
      run: |
        cd whale-monorepo
        python scripts/blog_automation.py --run ${{ inputs.force && '--force' || '' }}
      env:
        DATABASE_URL: ${{ secrets.DATABASE_URL }}
        REDIS_URL: ${{ secrets.REDIS_URL }}
        BLOG_LLM_API_KEY: ${{ secrets.BLOG_LLM_API_KEY }}
