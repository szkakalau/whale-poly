user_plans:
  free:
    alerts_delay: 10m
    max_alerts_per_day: 3
    min_whale_score: 0
    max_follow_whales: 0
  pro:
    alerts_delay: 0m
    max_alerts_per_day: unlimited
    min_whale_score: 70
    max_follow_whales: 20
    smart_collections: partial
  elite:
    alerts_delay: 0m
    max_alerts_per_day: unlimited
    min_whale_score: 80
    max_follow_whales: 100
    smart_collections: full
    high_confidence_first: true

alert_thresholds:
  micro_window: 20m
  macro_window: 2h
  confidence_scores:
    low_confidence: 70
    medium_confidence: 80
    high_confidence: 85
  usd_thresholds:
    low: 2500
    medium: 3000
    high: 5000
  spike_build_exit_thresholds:
    whale_entry: 5000
    whale_exit: 5000
    whale_build: 5000

cooldown_settings:
  same_wallet_same_market: 600s
  same_market_different_wallet: 60s
  increased_position: 300s

behavior_detection:
  spike_threshold: 5000
  build_threshold: 10000
  exit_threshold: 10000

vw_analysis:
  computation_window_days: 7
  min_24h_volume_usd: 1000
  min_alert_volume_usd: 5000
  divergence_threshold: 0.10
  velocity_5m_threshold: 0.03
  new_market_warmup_snapshots: 3
  alert_cooldown_minutes: 30
  snapshot_retention_days: 7
  hourly_retention_days: 30
  daily_retention_days: 90
  uai_extreme_price_threshold: 0.02
  uai_low_threshold: 0.3
  uai_high_threshold: 0.8
