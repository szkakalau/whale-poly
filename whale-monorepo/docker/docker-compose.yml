services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: whale
      POSTGRES_USER: whale
      POSTGRES_PASSWORD: whale
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U whale -d whale"]
      interval: 5s
      timeout: 5s
      retries: 20
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6382:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M

  landing:
    build:
      context: ../services/landing
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    depends_on:
      payment-api:
        condition: service_healthy
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── Unified service (replaces all api + worker services below) ──
  # Use this for cost-optimized single-process deployment.
  # No Redis needed — uses in-memory queues.
  sightwhale:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
      - REDIS_URL=
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: ["uvicorn", "services.unified.app:app", "--host", "0.0.0.0", "--port", "8000", "--workers", "1"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  # ── Legacy individual services (for debugging / local dev with Redis) ──
  trade-ingest-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8010:8010"
    command: ["uvicorn", "services.trade_ingest.api:app", "--host", "0.0.0.0", "--port", "8010", "--workers", "${UVICORN_WORKERS:-4}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8010/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  trade-ingest-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "services.trade_ingest.worker:celery_app", "worker", "-B", "-l", "INFO", "-Q", "trade_ingest"]
    healthcheck:
      test: ["CMD", "celery", "-A", "services.trade_ingest.worker:celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  whale-engine-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8011:8011"
    command: ["uvicorn", "services.whale_engine.api:app", "--host", "0.0.0.0", "--port", "8011", "--workers", "${UVICORN_WORKERS:-4}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8011/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  whale-engine-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "services.whale_engine.worker:celery_app", "worker", "-B", "-l", "INFO", "-Q", "whale_engine"]
    healthcheck:
      test: ["CMD", "celery", "-A", "services.whale_engine.worker:celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  alert-engine-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8012:8012"
    command: ["uvicorn", "services.alert_engine.api:app", "--host", "0.0.0.0", "--port", "8012", "--workers", "${UVICORN_WORKERS:-4}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8012/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  alert-engine-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["celery", "-A", "services.alert_engine.worker:celery_app", "worker", "-B", "-l", "INFO", "-Q", "alert_engine"]
    healthcheck:
      test: ["CMD", "celery", "-A", "services.alert_engine.worker:celery_app", "inspect", "ping", "-d", "celery@$$HOSTNAME"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G

  telegram-bot:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8013:8013"
    command: ["uvicorn", "services.telegram_bot.api:app", "--host", "0.0.0.0", "--port", "8013", "--workers", "${UVICORN_WORKERS:-4}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8013/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

  payment-api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - ALERT_CONFIG_PATH=/app/alert_engine_config.yaml
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8014:8014"
    command: ["uvicorn", "services.payment.api:app", "--host", "0.0.0.0", "--port", "8014", "--workers", "${UVICORN_WORKERS:-4}"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8014/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M

volumes:
  postgres_data:
